---
# deb-dist-upgrade.yml
# Performs a full dist-upgrade on all hosts and removes orphaned packages.
# Runs in non-interactive mode to avoid prompts during automated maintenance.
- name: Standard Infrastructure Maintenance
  hosts: all
  become: true
  environment:
    DEBIAN_FRONTEND: noninteractive
    UCF_FORCE_CONFOLD: "true"

  tasks:
    - name: Run apt update and upgrade
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600
        dpkg_options: 'force-confold,force-confdef'
      register: apt_output
      notify: Show the upgraded packages

    - name: Remove redundant packages
      ansible.builtin.apt:
        autoremove: true
        purge: true
      register: autoremove_output
      notify: Show cleanup details

  handlers:
    - name: Show the upgraded packages
      ansible.builtin.debug:
        msg: "{{ apt_output.stdout_lines }}"

    - name: Show cleanup details
      ansible.builtin.debug:
        msg: "{{ autoremove_output.stdout_lines }}"
