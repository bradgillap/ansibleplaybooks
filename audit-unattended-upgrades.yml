---
- name: Audit Unattended Upgrades
  hosts: all
  become: true
  gather_facts: true  # Needed to detect OS family
  tasks:
    - name: Check if unattended-upgrades is installed (Debian/Ubuntu)
      ansible.builtin.package_facts:
        manager: auto
      when: ansible_os_family == "Debian"

    - name: Report installation status
      ansible.builtin.debug:
        msg: "unattended-upgrades is {{ 'INSTALLED' if 'unattended-upgrades' in ansible_facts.packages else 'MISSING' }}"
      when: ansible_os_family == "Debian"

    - name: Check if auto-upgrade is enabled in APT config
      ansible.builtin.command: grep "APT::Periodic::Unattended-Upgrade \"1\";" /etc/apt/apt.conf.d/20auto-upgrades
      register: upgrade_check
      failed_when: false
      changed_when: false
      when: ansible_os_family == "Debian"

    - name: Final Status Summary
      ansible.builtin.set_fact:
        upgrade_status: "{{ 'ENABLED' if upgrade_check.rc == 0 else 'DISABLED/MISSING CONFIG' }}"
      when: ansible_os_family == "Debian"

    - name: Show final audit result
      ansible.builtin.debug:
        var: upgrade_status
      when: ansible_os_family == "Debian"
