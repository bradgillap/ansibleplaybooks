---
# linux-configure-timezone.yml
# Configures the system timezone and enables NTP time synchronization.
# Skips time-syncd and hardware clock tasks on LXC containers since they
# inherit time settings from the host.
- name: Comprehensive Timezone Configuration
  hosts: all
  become: true
  vars:
    selected_timezone: "America/Toronto"

  tasks:
    - name: Set system timezone
      community.general.timezone:
        name: "{{ selected_timezone }}"

    - name: Ensure systemd-timesyncd is installed
      ansible.builtin.package:
        name: systemd-timesyncd
        state: present
      # Skip if it's a container that relies on the host for sync
      when: ansible_virtualization_type != "lxc"

    - name: Enable and start systemd-timesyncd
      ansible.builtin.systemd:
        name: systemd-timesyncd
        enabled: true
        state: started
      when: ansible_virtualization_type != "lxc"

    - name: Force hardware clock to UTC (Skip on LXC)
      ansible.builtin.command: hwclock --systohc --utc
      when:
        - ansible_virtualization_type != "lxc"
        - ansible_virtualization_type != "container"
      changed_when: false
      register: hwclock_result
      failed_when:
        - hwclock_result.rc != 0
        - "'no such file or directory' not in hwclock_result.stderr | lower"
        - "'cannot open' not in hwclock_result.stderr | lower"
        - "'not supported' not in hwclock_result.stderr | lower"
