---
# deb-install-qol-packages.yml
# Installs a standardized set of sysadmin and quality-of-life packages
# across all hosts. Ensures consistent tooling for troubleshooting,
# networking diagnostics, and system automation.
- name: Standardize Base Software Packages
  hosts: all
  become: true

  tasks:
    - name: Update apt cache (equivalent to apt update)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600  # Only update if older than 1 hour

    - name: Install Sysadmin Essentials
      ansible.builtin.package:
        state: present
        name:
          # --- Quality of Life ---
          - tmux
          - htop
          - tree
          - git
          - curl
          - wget
          - rsync

          # --- Networking & Troubleshooting ---
          - net-tools    # for 'ifconfig' and 'netstat'
          - iputils-ping
          - dnsutils     # for 'nslookup' and 'dig'
          - mtr-tiny     # great for checking latency between subnets
          - nmap

          # --- System & Automation ---
          - sudo
          - unattended-upgrades
          - apt-listchanges
          - ca-certificates
