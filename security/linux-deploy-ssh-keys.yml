---
# linux-deploy-ssh-keys.yml
# Deploys SSH public keys to the root user's authorized_keys file
# on all hosts. Requires the 'my_root_key' variable to be defined
# (typically via Semaphore inventory or environment variables).
- name: Setup SSH Keys
  hosts: all
  become: true
  tasks:
    - name: Add key to root
      ansible.posix.authorized_key:
        user: root
        state: present
        key: "{{ my_root_key }}"
