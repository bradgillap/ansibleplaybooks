---
# linux-check-disk-space.yml
# Reports disk usage across all hosts using df -h.
# Useful for quick capacity checks during maintenance windows.
- name: Check Disk Space
  hosts: all
  become: yes
  tasks:
    - name: Check disk space
      ansible.builtin.command: df -h
      register: space
      changed_when: false

    - name: Show disk usage
      ansible.builtin.debug:
        var: space.stdout_lines
