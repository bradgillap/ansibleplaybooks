---
# linux-test-lxc-connectivity.yml
# Tests basic connectivity to all LXC containers in the inventory.
# Uses the Ansible ping module (not ICMP) to verify SSH access and
# Python availability on the target hosts.
- name: Test LXC Connectivity
  hosts: all  # This targets everything in your Semaphore Inventory
  gather_facts: false
  tasks:
    - name: Try to ping the containers
      ansible.builtin.ping:
