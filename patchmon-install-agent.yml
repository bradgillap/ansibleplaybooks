---
- name: Deploy Patchmon Agents
  hosts: lxc_containers
  become: yes
  vars:
    # These will be populated by Semaphore's Environment Variables
    # Accessing them via the 'env' lookup for maximum compatibility
    api_id: "{{ lookup('env', 'PATCHMON_ID') }}"
    api_key: "{{ lookup('env', 'PATCHMON_KEY') }}"
    install_url: "{{ lookup('env', 'PATCHMON_URL') }}"

  tasks:
    - name: Ensure curl is installed
      package:
        name: curl
        state: present

    - name: Download and execute the agent installation script
      shell: |
        curl -sk "{{ install_url }}" \
        -H "X-API-ID: {{ api_id }}" \
        -H "X-API-KEY: {{ api_key }}" | sh
      args:
        # Update this path if the agent binary is located elsewhere
        creates: /usr/bin/patchmon-agent

    - name: Ensure the agent service is started and enabled
      systemd:
        name: patchmon-agent
        state: started
        enabled: yes
      # Using ignore_errors in case the script doesn't use a standard systemd service name
      ignore_errors: yes
